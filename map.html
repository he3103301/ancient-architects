<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建筑项目地图 - 中国建筑科学家百科</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .map-container {
      padding: 20px;
      padding-bottom: 120px;
    }

    .map-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .map-header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }

    .map-header p {
      font-size: 14px;
      color: #666;
    }

    .map-wrapper {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .china-map {
      width: 100%;
      height: auto;
    }

    .china-map path {
      fill: #d4e5d4;
      stroke: #fff;
      stroke-width: 1;
      cursor: pointer;
      transition: all 0.3s;
    }

    .china-map path:hover {
      fill: #0f3460;
      transform: scale(1.02);
    }

    .china-map path.active {
      fill: #0f3460;
    }

    .map-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .legend-dot.tang { background: #e74c3c; }
    .legend-dot.song { background: #3498db; }
    .legend-dot.ming { background: #f39c12; }
    .legend-dot.qing { background: #9b59b6; }

    .location-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #e74c3c;
      border: 3px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: pulse 2s infinite;
    }

    .location-marker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    .region-list {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .region-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #0f3460;
    }

    .region-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .region-tab {
      padding: 8px 16px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s;
    }

    .region-tab.active {
      background: #0f3460;
      color: #fff;
    }

    .region-content {
      display: none;
    }

    .region-content.active {
      display: block;
    }

    .architect-map-card {
      display: flex;
      align-items: center;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 12px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }

    .architect-map-card:hover {
      background: #f0f0f0;
      transform: translateX(4px);
    }

    .architect-map-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #0f3460, #1a1a2e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .architect-map-info {
      flex: 1;
    }

    .architect-map-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .architect-map-location {
      font-size: 12px;
      color: #999;
    }

    .architect-map-link {
      color: #0f3460;
      font-size: 14px;
    }

    .map-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .map-stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .map-stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #0f3460;
    }

    .map-stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="map-container">
      <!-- 页面标题 -->
      <div class="map-header">
        <h1>🗺️ 建筑项目地图</h1>
        <p>探索中国古代建筑家的足迹</p>
      </div>

      <!-- 统计数据 -->
      <div class="map-stats">
        <div class="map-stat-card">
          <div class="map-stat-number">35</div>
          <div class="map-stat-label">覆盖城市</div>
        </div>
        <div class="map-stat-card">
          <div class="map-stat-number">100+</div>
          <div class="map-stat-label">代表建筑</div>
        </div>
      </div>

      <!-- 地图区域 -->
      <div class="map-wrapper">
        <svg class="china-map" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
          <!-- 中国地图简化轮廓 -->
          <path id="north" d="M280 30 L320 35 L340 60 L350 90 L340 120 L310 130 L280 125 L260 100 L270 70 Z" data-region="华北" />
          <path id="northeast" d="M340 60 L380 50 L420 70 L430 110 L420 150 L380 160 L350 140 L340 120 Z" data-region="东北" />
          <path id="east" d="M280 125 L320 130 L350 140 L380 160 L390 200 L370 230 L330 240 L290 230 L270 200 L260 160 Z" data-region="华东" />
          <path id="central" d="M260 160 L290 170 L310 200 L300 240 L270 250 L240 230 L250 200 Z" data-region="华中" />
          <path id="south" d="M240 230 L270 250 L280 290 L260 330 L220 340 L200 310 L210 270 Z" data-region="华南" />
          <path id="southwest" d="M140 280 L180 260 L220 270 L240 310 L230 360 L190 380 L140 350 L120 310 Z" data-region="西南" />
          <path id="northwest" d="M100 150 L180 130 L220 150 L230 200 L210 250 L170 270 L120 250 L80 200 L70 160 Z" data-region="西北" />
          
          <!-- 标记点 -->
          <g class="markers">
            <!-- 北京 -->
            <circle cx="320" cy="140" r="8" fill="#e74c3c" class="marker" data-name="北京" data-count="5" />
            <text x="320" y="160" font-size="10" text-anchor="middle" fill="#333">北京</text>
            
            <!-- 西安 -->
            <circle cx="260" cy="180" r="8" fill="#3498db" class="marker" data-name="西安" data-count="4" />
            <text x="260" y="200" font-size="10" text-anchor="middle" fill="#333">西安</text>
            
            <!-- 南京 -->
            <circle cx="350" cy="210" r="8" fill="#f39c12" class="marker" data-name="南京" data-count="3" />
            <text x="350" y="230" font-size="10" text-anchor="middle" fill="#333">南京</text>
            
            <!-- 苏州 -->
            <circle cx="370" cy="230" r="6" fill="#9b59b6" class="marker" data-name="苏州" data-count="2" />
            <text x="370" y="250" font-size="10" text-anchor="middle" fill="#333">苏州</text>
            
            <!-- 洛阳 -->
            <circle cx="300" cy="190" r="6" fill="#e74c3c" class="marker" data-name="洛阳" data-count="3" />
            <text x="300" y="210" font-size="10" text-anchor="middle" fill="#333">洛阳</text>
            
            <!-- 承德 -->
            <circle cx="330" cy="135" r="6" fill="#3498db" class="marker" data-name="承德" data-count="1" />
            
            <!-- 拉萨 -->
            <circle cx="150" cy="340" r="6" fill="#9b59b6" class="marker" data-name="拉萨" data-count="1" />
            <text x="150" y="360" font-size="10" text-anchor="middle" fill="#333">拉萨</text>
            
            <!-- 扬州 -->
            <circle cx="360" cy="215" r="5" fill="#f39c12" class="marker" data-name="扬州" data-count="1" />
          </g>
        </svg>
        
        <div class="map-legend">
          <div class="legend-item">
            <span class="legend-dot tang"></span>
            <span>唐代以前</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot song"></span>
            <span>宋辽金</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot ming"></span>
            <span>明代</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot qing"></span>
            <span>清代</span>
          </div>
        </div>
      </div>

      <!-- 区域列表 -->
      <div class="region-list">
        <div class="region-title">📍 各地建筑分布</div>
        <div class="region-tabs">
          <div class="region-tab active" data-region="all">全部</div>
          <div class="region-tab" data-region="华北">华北</div>
          <div class="region-tab" data-region="西北">西北</div>
          <div class="region-tab" data-region="华东">华东</div>
          <div class="region-tab" data-region="华中">华中</div>
          <div class="region-tab" data-region="西南">西南</div>
        </div>
        <div class="region-content active" id="region-all"></div>
        <div class="region-content" id="region-华北"></div>
        <div class="region-content" id="region-西北"></div>
        <div class="region-content" id="region-华东"></div>
        <div class="region-content" id="region-华中"></div>
        <div class="region-content" id="region-西南"></div>
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">首页</span>
    </a>
    <a href="search.html" class="tab-item">
      <span class="tab-icon">🔍</span>
      <span class="tab-text">搜索</span>
    </a>
    <a href="map.html" class="tab-item active">
      <span class="tab-icon">🗺️</span>
      <span class="tab-text">地图</span>
    </a>
    <a href="study.html" class="tab-item">
      <span class="tab-icon">📖</span>
      <span class="tab-text">学习</span>
    </a>
    <a href="my.html" class="tab-item">
      <span class="tab-icon">👤</span>
      <span class="tab-text">我的</span>
    </a>
  </div>

  <script src="js/data.js"></script>
  <script>
    // 建筑位置数据
    const locationData = [
      { name: '鲁班', dynasty: '春秋', location: '山东曲阜', region: '华东', works: ['攻城云梯', '木工工具'] },
      { name: '李冰', dynasty: '战国', location: '四川成都', region: '西南', works: ['都江堰'] },
      { name: '蒙恬', dynasty: '秦', location: '陕西咸阳', region: '西北', works: ['秦长城'] },
      { name: '张骞', dynasty: '汉', location: '陕西西安', region: '西北', works: ['丝绸之路'] },
      { name: '张衡', dynasty: '东汉', location: '河南南阳', region: '华中', works: ['地动仪', '浑天仪'] },
      { name: '马钧', dynasty: '三国', location: '陕西西安', region: '西北', works: ['指南车', '龙骨水车'] },
      { name: '宇文恺', dynasty: '隋', location: '陕西西安', region: '西北', works: ['大兴城', '广通渠'] },
      { name: '李春', dynasty: '隋', location: '河北赵县', region: '华北', works: ['赵州桥'] },
      { name: '阎立德', dynasty: '唐', location: '陕西西安', region: '西北', works: ['大明宫', '翠微宫'] },
      { name: '李约瑟', dynasty: '唐', location: '陕西西安', region: '西北', works: ['建筑学著作'] },
      { name: '喻皓', dynasty: '五代', location: '浙江杭州', region: '华东', works: ['木经'] },
      { name: '李诫', dynasty: '北宋', location: '河南开封', region: '华中', works: ['营造法式'] },
      { name: '沈括', dynasty: '北宋', location: '浙江杭州', region: '华东', works: ['梦溪笔谈'] },
      { name: '李春', dynasty: '隋', location: '河北赵县', region: '华北', works: ['赵州桥'] },
      { name: '张择端', dynasty: '北宋', location: '山东潍坊', region: '华东', works: ['清明上河图'] },
      { name: '李嵩', dynasty: '南宋', location: '浙江杭州', region: '华东', works: ['建筑画'] },
      { name: '郭守敬', dynasty: '元', location: '北京', region: '华北', works: ['登封观星台'] },
      { name: '蒯祥', dynasty: '明', location: '北京', region: '华北', works: ['故宫', '天安门'] },
      { name: '计成', dynasty: '明', location: '江苏苏州', region: '华东', works: ['园冶'] },
      { name: '文震亨', dynasty: '明', location: '江苏苏州', region: '华东', works: ['长物志'] },
      { name: '徐光启', dynasty: '明', location: '上海', region: '华东', works: ['农政全书'] },
      { name: '宋应星', dynasty: '明', location: '江西宜春', region: '华东', works: ['天工开物'] },
      { name: '雷发达', dynasty: '清', location: '北京', region: '华北', works: ['样式雷图档'] },
      { name: '雷金玉', dynasty: '清', location: '北京', region: '华北', works: ['圆明园'] },
      { name: '样式雷', dynasty: '清', location: '北京', region: '华北', works: ['清西陵', '颐和园'] },
      { name: '姚承祖', dynasty: '清', location: '江苏苏州', region: '华东', works: ['营造法原'] },
      { name: '梁思成', dynasty: '现代', location: '北京', region: '华北', works: ['中国建筑史'] },
      { name: '林徽因', dynasty: '现代', location: '北京', region: '华北', works: ['人民英雄纪念碑'] }
    ];

    // 按区域分组
    const regionGroups = {
      'all': locationData,
      '华北': locationData.filter(item => item.region === '华北'),
      '西北': locationData.filter(item => item.region === '西北'),
      '华东': locationData.filter(item => item.region === '华东'),
      '华中': locationData.filter(item => item.region === '华中'),
      '西南': locationData.filter(item => item.region === '西南')
    };

    // 渲染列表
    function renderRegionList(region) {
      const container = document.getElementById(`region-${region}`);
      const items = regionGroups[region] || [];
      
      container.innerHTML = items.map(item => `
        <a href="detail.html?name=${encodeURIComponent(item.name)}" class="architect-map-card">
          <div class="architect-map-avatar">${item.name[0]}</div>
          <div class="architect-map-info">
            <div class="architect-map-name">${item.name}</div>
            <div class="architect-map-location">📍 ${item.location} · ${item.dynasty}</div>
          </div>
          <span class="architect-map-link">查看 ›</span>
        </a>
      `).join('');
    }

    // 初始化所有区域
    Object.keys(regionGroups).forEach(region => {
      renderRegionList(region);
    });

    // 标签切换
    document.querySelectorAll('.region-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.region-content').forEach(c => c.classList.remove('active'));
        
        this.classList.add('active');
        const region = this.dataset.region;
        document.getElementById(`region-${region}`).classList.add('active');
      });
    });

    // 地图标记点击
    document.querySelectorAll('.marker').forEach(marker => {
      marker.addEventListener('click', function() {
        const name = this.dataset.name;
        const count = this.dataset.count;
        alert(`${name}：收录 ${count} 位建筑家，代表作品包括故宫、天坛等`);
      });
    });
  </script>
</body>
</html>
