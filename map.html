<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建筑项目地图 - 中国建筑科学家百科</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .map-container {
      padding: 15px;
      padding-bottom: 100px;
    }

    .map-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .map-header h1 {
      font-size: 22px;
      color: #5D3A1A;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .map-header p {
      font-size: 13px;
      color: #8B6914;
    }

    .map-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 20px rgba(139, 69, 19, 0.08);
      overflow: hidden;
    }

    .china-map {
      width: 100%;
      height: 320px;
      position: relative;
      background: linear-gradient(135deg, #FFF8E7 0%, #FAF3E0 100%);
      border-radius: 12px;
      border: 2px solid #E8DCC8;
    }

    .china-map svg {
      width: 100%;
      height: 100%;
    }

    .province {
      fill: #E8DCC8;
      stroke: #8B6914;
      stroke-width: 1;
      transition: all 0.3s;
      cursor: pointer;
    }

    .province:hover {
      fill: #D2B48C;
    }

    .province.active {
      fill: #CD853F;
    }

    .city-marker {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
    }

    .city-marker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .city-marker:hover::after {
      opacity: 0.3;
    }

    .city-marker.ancient { background: #8B4513; box-shadow: 0 0 8px #8B4513; }
    .city-marker.tang { background: #D2691E; box-shadow: 0 0 8px #D2691E; }
    .city-marker.song { background: #CD853F; box-shadow: 0 0 8px #CD853F; }
    .city-marker.ming { background: #DEB887; box-shadow: 0 0 8px #DEB887; }
    .city-marker.qing { background: #F4A460; box-shadow: 0 0 8px #F4A460; }
    .city-marker.modern { background: #BC8F8F; box-shadow: 0 0 8px #BC8F8F; }

    .city-marker:hover {
      transform: scale(1.5);
      z-index: 20;
    }

    .city-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      white-space: nowrap;
    }

    .city-tooltip.visible {
      opacity: 1;
    }

    .city-tooltip .tooltip-city {
      font-weight: 600;
      margin-bottom: 4px;
      display: block;
      color: #F4A460;
    }

    .city-tooltip .tooltip-count {
      font-size: 11px;
      opacity: 0.9;
    }

    .map-legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
      flex-wrap: wrap;
      padding-top: 15px;
      border-top: 1px solid #F0EBE3;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #666;
      background: #F9F6F0;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.ancient { background: #8B4513; }
    .legend-dot.tang { background: #D2691E; }
    .legend-dot.song { background: #CD853F; }
    .legend-dot.ming { background: #DEB887; }
    .legend-dot.qing { background: #F4A460; }
    .legend-dot.modern { background: #BC8F8F; }

    .map-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .map-stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(139, 69, 19, 0.06);
    }

    .map-stat-number {
      font-size: 22px;
      font-weight: 700;
      color: #8B4513;
    }

    .map-stat-label {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .region-list {
      background: #fff;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(139, 69, 19, 0.08);
    }

    .region-title {
      font-size: 15px;
      font-weight: 600;
      color: #5D3A1A;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid #8B4513;
    }

    .region-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
    }

    .region-tabs::-webkit-scrollbar {
      display: none;
    }

    .region-tab {
      padding: 6px 14px;
      background: #f9f6f0;
      border-radius: 16px;
      font-size: 13px;
      color: #8B4513;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #e8dcc8;
    }

    .region-tab.active {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      color: #fff;
      border-color: transparent;
    }

    .region-content {
      display: none;
    }

    .region-content.active {
      display: block;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .city-item {
      background: #f9f6f0;
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #e8dcc8;
    }

    .city-item:active {
      background: #e8dcc8;
      transform: scale(0.98);
    }

    .city-name {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 3px;
    }

    .city-count {
      font-size: 11px;
      color: #8B4513;
    }

    .architect-map-card {
      display: flex;
      align-items: center;
      padding: 14px;
      background: #faf8f5;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: all 0.3s;
      border: 1px solid #f0ebe3;
    }

    .architect-map-card:active {
      background: #f0ebe3;
      transform: translateX(4px);
    }

    .architect-map-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #8B4513, #A0522D);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .architect-map-info {
      flex: 1;
    }

    .architect-map-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 3px;
    }

    .architect-map-location {
      font-size: 11px;
      color: #999;
    }

    .architect-map-link {
      color: #8B4513;
      font-size: 13px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #fff;
      border-radius: 16px;
      width: 85%;
      max-width: 350px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 20px;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.visible .modal-content {
      transform: scale(1);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #5D3A1A;
      margin-bottom: 15px;
      text-align: center;
    }

    .modal-architect-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0ebe3;
    }

    .modal-architect-item:last-child {
      border-bottom: none;
    }

    .modal-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #8B4513, #A0522D);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      margin-right: 12px;
    }

    .modal-info {
      flex: 1;
    }

    .modal-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 2px;
    }

    .modal-dynasty {
      font-size: 11px;
      color: #999;
    }

    .modal-close {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>

    function getDynastyClass(dynasty) {
      if (['春秋', '战国', '秦', '汉', '东汉', '三国', '北魏'].includes(dynasty)) return 'ancient';
      if (['隋', '唐', '五代'].includes(dynasty)) return 'tang';
      if (['北宋', '南宋', '元'].includes(dynasty)) return 'song';
      if (['明', '明末清初'].includes(dynasty)) return 'ming';
      if (['清'].includes(dynasty)) return 'qing';
      return 'modern';
    }

    function createCityMarkers() {
      const map = document.getElementById('chinaMap');
      const cityGroups = {};
      
      locationData.forEach(item => {
        if (!cityGroups[item.city]) {
          cityGroups[item.city] = { x: item.x, y: item.y, count: 0, dynasty: item.dynasty, items: [] };
        }
        cityGroups[item.city].count++;
        cityGroups[item.city].items.push(item);
      });

      Object.keys(cityGroups).forEach(city => {
        const info = cityGroups[city];
        const marker = document.createElement('div');
        marker.className = `city-marker ${getDynastyClass(info.dynasty)}`;
        marker.style.left = `${(info.x / 400) * 100}%`;
        marker.style.top = `${(info.y / 300) * 100}%`;
        marker.style.transform = 'translate(-50%, -50%)';
        
        marker.onmouseenter = function(e) {
          showTooltip(e, city, info.count);
        };
        
        marker.onmouseleave = function() {
          hideTooltip();
        };
        
        marker.onclick = function() {
          showCityModal(city, info.items);
        };
        
        map.appendChild(marker);
      });
    }

    function showTooltip(e, city, count) {
      let tooltip = document.getElementById('cityTooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'cityTooltip';
        tooltip.className = 'city-tooltip';
        document.body.appendChild(tooltip);
      }
      
      tooltip.innerHTML = `<span class="tooltip-city">${city}</span><span class="tooltip-count">${count}位建筑家</span>`;
      tooltip.style.left = `${e.clientX + 10}px`;
      tooltip.style.top = `${e.clientY - 50}px`;
      tooltip.classList.add('visible');
    }

    function hideTooltip() {
      const tooltip = document.getElementById('cityTooltip');
      if (tooltip) {
        tooltip.classList.remove('visible');
      }
    }

    function showCityModal(city, items) {
      const modal = document.getElementById('cityModal');
      const title = document.getElementById('modalTitle');
      const content = document.getElementById('modalContent');
      
      title.textContent = `${city} - 建筑家`;
      
      const uniqueItems = [...new Map(items.map(item => [item.name, item])).values()];
      
      content.innerHTML = uniqueItems.map(item => `
        <div class="modal-architect-item" onclick="window.location.href='detail.html?name=${encodeURIComponent(item.name)}'">
          <div class="modal-avatar">${item.name[0]}</div>
          <div class="modal-info">
            <div class="modal-name">${item.name}</div>
            <div class="modal-dynasty">${item.dynasty} · ${item.location}</div>
          </div>
        </div>
      `).join('');
      
      modal.classList.add('visible');
    }

    function closeModal() {
      const modal = document.getElementById('cityModal');
      modal.classList.remove('visible');
    }

    const regionGroups = {
      'all': locationData,
      '华北': locationData.filter(item => item.region === '华北'),
      '西北': locationData.filter(item => item.region === '西北'),
      '华东': locationData.filter(item => item.region === '华东'),
      '华中': locationData.filter(item => item.region === '华中'),
      '西南': locationData.filter(item => item.region === '西南'),
      '东北': locationData.filter(item => item.region === '东北'),
      '华南': locationData.filter(item => item.region === '华南')
    };

    function getCityCounts(items) {
      const counts = {};
      items.forEach(item => {
        counts[item.city] = (counts[item.city] || 0) + 1;
      });
      return counts;
    }

    function renderRegionList(region) {
      const container = document.getElementById(`region-${region}`);
      const items = regionGroups[region] || [];
      
      const uniqueItems = [...new Map(items.map(item => [item.name, item])).values()];
      const cityCounts = getCityCounts(items);
      
      let html = '';
      
      if (Object.keys(cityCounts).length > 0) {
        html += '<div class="city-grid">';
        Object.entries(cityCounts).forEach(([city, count]) => {
          html += `
            <div class="city-item" onclick="showCityArchitects('${city}')">
              <div class="city-name">${city}</div>
              <div class="city-count">${count}位建筑家</div>
            </div>
          `;
        });
        html += '</div>';
      }
      
      if (uniqueItems.length > 0) {
        html += '<div style="margin-top: 15px;">';
        html += '<div style="font-size: 13px; font-weight: 600; color: #5D3A1A; margin-bottom: 10px;">建筑家列表</div>';
        html += uniqueItems.map(item => `
          <a href="detail.html?name=${encodeURIComponent(item.name)}" class="architect-map-card">
            <div class="architect-map-avatar">${item.name[0]}</div>
            <div class="architect-map-info">
              <div class="architect-map-name">${item.name}</div>
              <div class="architect-map-location">📍 ${item.location} · ${item.dynasty}</div>
            </div>
            <span class="architect-map-link">查看 ›</span>
          </a>
        `).join('');
        html += '</div>';
      } else {
        html += '<div class="empty-state" style="padding: 30px;">暂无数据</div>';
      }
      
      container.innerHTML = html;
    }

    function showCityArchitects(city) {
      const cityArchitects = locationData.filter(item => item.city === city);
      if (cityArchitects.length > 0) {
        showCityModal(city, cityArchitects);
      }
    }

    createCityMarkers();

    Object.keys(regionGroups).forEach(region => {
      renderRegionList(region);
    });

    document.querySelectorAll('.region-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.region-content').forEach(c => c.classList.remove('active'));
        
        this.classList.add('active');
        const region = this.dataset.region;
        document.getElementById(`region-${region}`).classList.add('active');
      });
    });

    document.getElementById('cityModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
  </script>
