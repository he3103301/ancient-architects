<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中国建筑科学家百科</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <div class="header">
      <div class="title-wrapper">
        <h1 class="main-title">中国建筑科学家百科</h1>
        <p class="subtitle">探索千年建筑智慧</p>
      </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box-wrapper">
      <a href="search.html" class="search-box">
        <span class="icon-search">🔍</span>
        <span class="search-placeholder">搜索名称、朝代、作品、建筑类型...</span>
      </a>
    </div>

    <!-- 装饰元素 -->
    <div class="decorations">
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-2"></div>
      <div class="deco-line"></div>
    </div>

    <!-- 数据统计 -->
    <div class="stats-section">
      <div class="stats-intro">
        <p class="intro-text">汇集中国古代建筑科技精华</p>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number" id="architectCount">0</div>
          <div class="stat-label">收录人物</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number">14</div>
          <div class="stat-label">历史朝代</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number">100+</div>
          <div class="stat-label">代表作品</div>
        </div>
      </div>
    </div>

    <!-- 推荐建筑家 -->
    <div class="recommend-section">
      <div class="section-header">
        <h2 class="section-title">推荐建筑家</h2>
        <a href="search.html" class="section-more">查看全部 ›</a>
      </div>
      <div class="recommend-scroll">
        <div class="recommend-list" id="recommendList"></div>
      </div>
    </div>

    <!-- 功能入口 -->
    <div class="entry-section">
      <a href="search.html" class="entry-card">
        <div class="entry-icon">🔍</div>
        <div class="entry-info">
          <div class="entry-title">搜索建筑家</div>
          <div class="entry-desc">查找感兴趣的古代建筑科学家</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>

      <a href="map.html" class="entry-card">
        <div class="entry-icon">🗺️</div>
        <div class="entry-info">
          <div class="entry-title">项目地图</div>
          <div class="entry-desc">探索建筑家的足迹分布</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>

      <a href="relationship.html" class="entry-card">
        <div class="entry-icon">🔗</div>
        <div class="entry-info">
          <div class="entry-title">师承图谱</div>
          <div class="entry-desc">了解建筑家的师承关系</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>

      <a href="study.html" class="entry-card">
        <div class="entry-icon">📖</div>
        <div class="entry-info">
          <div class="entry-title">考研学习</div>
          <div class="entry-desc">速记卡片和题库练习</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>

      <a href="gallery.html" class="entry-card">
        <div class="entry-icon">🖼️</div>
        <div class="entry-info">
          <div class="entry-title">高清图集</div>
          <div class="entry-desc">欣赏古代建筑之美</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>

      <a href="contribute.html" class="entry-card">
        <div class="entry-icon">✍️</div>
        <div class="entry-info">
          <div class="entry-title">用户投稿</div>
          <div class="entry-desc">一起完善百科内容</div>
        </div>
        <span class="entry-arrow">›</span>
      </a>
    </div>

    <!-- 底部装饰 -->
    <div class="footer-decoration">
      <div class="footer-pattern"></div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item active">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">首页</span>
    </a>
    <a href="search.html" class="tab-item">
      <span class="tab-icon">🔍</span>
      <span class="tab-text">搜索</span>
    </a>
    <a href="map.html" class="tab-item">
      <span class="tab-icon">🗺️</span>
      <span class="tab-text">地图</span>
    </a>
    <a href="relationship.html" class="tab-item">
      <span class="tab-icon">🔗</span>
      <span class="tab-text">图谱</span>
    </a>
    <a href="study.html" class="tab-item">
      <span class="tab-icon">📖</span>
      <span class="tab-text">学习</span>
    </a>
    <a href="my.html" class="tab-item">
      <span class="tab-icon">👤</span>
      <span class="tab-text">我的</span>
    </a>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('architectCount').textContent = architects.length;
      
      const recommendList = document.getElementById('recommendList');
      const recommendArchitects = architects.slice(0, 8);
      
      recommendList.innerHTML = recommendArchitects.map(item => `
        <a href="detail.html?id=${item.id}" class="recommend-card">
          <div class="recommend-avatar">
            <span class="recommend-avatar-text">${item.name[0]}</span>
          </div>
          <div class="recommend-name">${item.name}</div>
          <div class="recommend-dynasty">${item.dynasty}</div>
        </a>
      `).join('');
    });
  </script>
</body>
</html>
