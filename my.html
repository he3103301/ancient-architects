<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - 中国建筑科学家百科</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-wrapper">
        <h1 class="main-title">我的</h1>
        <p class="subtitle">个人中心</p>
      </div>
    </div>

    <div id="loginSection">
      <div class="login-card">
        <div class="login-icon">👤</div>
        <div class="login-title">欢迎登录</div>
        <div class="login-desc">登录后可保存收藏和学习进度</div>
        
        <div class="login-hint">
          <span>账号：admin</span>
          <span>密码：123456</span>
        </div>
        
        <div class="login-form">
          <div class="form-group">
            <input type="text" id="username" placeholder="请输入用户名" class="login-input">
          </div>
          <div class="form-group">
            <input type="password" id="password" placeholder="请输入密码" class="login-input">
          </div>
          <button class="login-btn" onclick="handleLogin()">登 录</button>
        </div>
      </div>
    </div>

    <div id="userSection" style="display:none">
      <div class="user-card">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-name" id="userName">用户名</div>
          <div class="user-desc">欢迎来到建筑科学家百科</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">退出登录</button>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num" id="favCount">0</div>
          <div class="stat-label">我的收藏</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="studyCount">0</div>
          <div class="stat-label">学习进度</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="contributeCount">0</div>
          <div class="stat-label">投稿记录</div>
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-title">我的收藏</div>
        <div id="favoritesContainer">
          <div class="architect-list" id="favoritesList"></div>
          <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">⭐</div>
            <div>暂无收藏</div>
            <div class="empty-hint"><a href="search.html" style="color:#8B6914">去搜索感兴趣的建筑家</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">首页</span>
    </a>
    <a href="search.html" class="tab-item">
      <span class="tab-icon">🔍</span>
      <span class="tab-text">搜索</span>
    </a>
    <a href="map.html" class="tab-item">
      <span class="tab-icon">🗺️</span>
      <span class="tab-text">地图</span>
    </a>
    <a href="relationship.html" class="tab-item">
      <span class="tab-icon">🔗</span>
      <span class="tab-text">图谱</span>
    </a>
    <a href="study.html" class="tab-item">
      <span class="tab-icon">📖</span>
      <span class="tab-text">学习</span>
    </a>
    <a href="my.html" class="tab-item active">
      <span class="tab-icon">👤</span>
      <span class="tab-text">我的</span>
    </a>
  </div>

  <script src="js/data.js"></script>
  <script>
    function getFavorites() {
      const favs = localStorage.getItem('favorites');
      return favs ? JSON.parse(favs) : [];
    }
    
    function removeFavorite(id) {
      const favs = getFavorites();
      const index = favs.indexOf(id);
      if (index > -1) {
        favs.splice(index, 1);
      }
      localStorage.setItem('favorites', JSON.stringify(favs));
    }

    function getCurrentUser() {
      return localStorage.getItem('currentUser');
    }

    function setCurrentUser(username) {
      localStorage.setItem('currentUser', username);
    }

    function removeCurrentUser() {
      localStorage.removeItem('currentUser');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      checkLogin();
    });

    function checkLogin() {
      const user = getCurrentUser();
      if (user) {
        showUserSection(user);
      } else {
        showLoginSection();
      }
    }

    function showLoginSection() {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('userSection').style.display = 'none';
    }

    function showUserSection(username) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('userSection').style.display = 'block';
      document.getElementById('userName').textContent = username;
      updateStats();
      renderFavorites();
    }

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === 'admin' && password === '123456') {
        setCurrentUser(username);
        showToast('登录成功');
        showUserSection(username);
      } else {
        showToast('用户名或密码错误');
      }
    }

    function handleLogout() {
      removeCurrentUser();
      showToast('已退出登录');
      showLoginSection();
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function updateStats() {
      const favCount = getFavorites().length;
      document.getElementById('favCount').textContent = favCount;

      const studyProgress = localStorage.getItem('studyProgress');
      document.getElementById('studyCount').textContent = studyProgress || '0%';

      const contributions = localStorage.getItem('contributions');
      const contribCount = contributions ? JSON.parse(contributions).length : 0;
      document.getElementById('contributeCount').textContent = contribCount;
    }

    function renderFavorites() {
      const favoriteIds = getFavorites();
      const favoriteArchitects = architects.filter(a => favoriteIds.includes(a.id));
      
      if (favoriteArchitects.length > 0) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('favoritesList').innerHTML = favoriteArchitects.map(item => `
          <a href="detail.html?id=${item.id}" class="card">
            <div class="architect-header">
              <div class="avatar-placeholder">
                <span class="avatar-text">${item.name[0]}</span>
              </div>
              <div class="architect-info">
                <div class="title">${item.name}</div>
                <div class="subtitle">${item.dynasty} · ${item.title}</div>
              </div>
              <div class="favorite-btn" onclick="event.preventDefault(); removeFav(${item.id})">
                ❤️
              </div>
            </div>
            <div class="architect-summary">${item.summary}</div>
          </a>
        `).join('');
      } else {
        document.getElementById('favoritesList').innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
      }
    }

    function removeFav(id) {
      removeFavorite(id);
      renderFavorites();
      updateStats();
    }
  </script>
</body>
</html>
